<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>나무위키 → Obsidian</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #1a1a2e;
      color: #e2e0f0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
    }
    header {
      border-bottom: 1px solid #2d2d4e;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: #16213e;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #a78bfa, #6d28d9);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo-title { font-size: 16px; font-weight: 700; color: #a78bfa; letter-spacing: 0.5px; }
    .logo-sub { font-size: 10px; color: #4a4a6a; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
    main {
      flex: 1;
      padding: 24px 28px;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
    }
    .middle {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .panel { display: flex; flex-direction: column; gap: 6px; }
    .panel-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    label {
      font-size: 10px;
      color: #4a4a7a;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .char-count { font-size: 10px; color: #3a3a5a; }
    textarea {
      height: 60vh;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #c8c4e8;
      padding: 16px;
      font-size: 13px;
      line-height: 1.75;
      resize: none;
      outline: none;
      font-family: 'Consolas', 'Courier New', monospace;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #5a4a8a; }
    #output { color: #86efac; }
    .actions { display: none; }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4c1d95);
      border: none;
      color: #fff;
      padding: 11px 28px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: transparent;
      border: 1px solid #2a2a4a;
      color: #4a4a7a;
      padding: 11px 18px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: #4a4a7a; color: #8a8aaa; }
    .btn-copy {
      background: transparent;
      border: 1px solid #2a2a4a;
      color: #4a4a7a;
      padding: 4px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }
    .btn-copy.copied { background: #052e16; border-color: #166534; color: #4ade80; }
    footer {
      border-top: 1px solid #1e1e3a;
      padding: 10px 28px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #2a2a4a;
    }
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      main { padding: 12px; }
      textarea { height: 45vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🔮</div>
  <div>
    <div class="logo-title">나무위키 → Obsidian</div>
    <div class="logo-sub">Namu Wiki to Obsidian Markdown Converter</div>
  </div>
</header>

<main>
  <div class="grid">
    <div class="panel">
      <div class="panel-label">
        <label>나무위키 원문</label>
        <span class="char-count" id="inputCount">0자</span>
      </div>
      <textarea id="input" placeholder="나무위키에서 복사한 텍스트를 여기에 붙여넣으세요."></textarea>
    </div>
    <div class="middle">
      <button class="btn-primary" onclick="convert()">✦ 변환</button>
      <button class="btn-secondary" onclick="reset()">↺ 초기화</button>
    </div>
    <div class="panel">
      <div class="panel-label">
        <label>Obsidian Markdown</label>
        <button class="btn-copy" id="copyBtn" onclick="copyOutput()" style="display:none">복사</button>
      </div>
      <textarea id="output" readonly placeholder="변환 결과가 여기에 표시됩니다."></textarea>
    </div>
  </div>
</main>

<footer>
  <span>나무위키 → Obsidian Converter · 완전 무료 · 오프라인 작동</span>
  <span>API 불필요</span>
</footer>

<script>
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const copyBtn = document.getElementById('copyBtn');
const inputCount = document.getElementById('inputCount');

inputEl.addEventListener('input', () => {
  inputCount.textContent = inputEl.value.length.toLocaleString() + '자';
});

function convert() {
  const raw = inputEl.value;
  if (!raw.trim()) return;

  let t = raw;

  // ── 1. 나무위키 메타 제거 ──────────────────────────
  t = t.replace(/\[목차\]/g, '');
  t = t.replace(/\[include\([^)]*\)\]/g, '');
  t = t.replace(/\[youtube\(([^,)]+)[^)]*\)\]/g, (_, id) => `[YouTube](https://youtu.be/${id.trim()})`);
  t = t.replace(/\[age\([^)]*\)\]/g, '');
  t = t.replace(/\[dday\([^)]*\)\]/g, '');
  t = t.replace(/\[br\]/gi, '\n');
  t = t.replace(/\[\[분류:[^\]]*\]\]/g, '');
  t = t.replace(/\[\[Category:[^\]]*\]\]/gi, '');

  // ── 2. 블록 매크로 ────────────────────────────────
  // {{{#!wiki ...}}} → 내용만 추출
  t = t.replace(/\{\{\{#!wiki[^\n]*\n([\s\S]*?)\}\}\}/g, (_, inner) => inner.trim());
  // {{{#!html ...}}} → 내용만 추출
  t = t.replace(/\{\{\{#!html[^\n]*\n([\s\S]*?)\}\}\}/g, (_, inner) => inner.trim());
  // {{{#!folding ...}}} → 내용만 추출
  t = t.replace(/\{\{\{#!folding[^\n]*\n([\s\S]*?)\}\}\}/g, (_, inner) => inner.trim());

  // ── 3. 글자 크기/색 서식 제거 ──────────────────────
  // {{{+N text}}} → text
  t = t.replace(/\{\{\{[+\-][0-9]\s+([\s\S]+?)\}\}\}/g, '$1');
  // {{{#색 text}}} → text
  t = t.replace(/\{\{\{#[a-zA-Z0-9,]+\s+([\s\S]+?)\}\}\}/g, '$1');
  // {{{ 인라인 코드 }}}
  t = t.replace(/\{\{\{([^\n{}]+)\}\}\}/g, '`$1`');

  // ── 4. 각주 → 옵시디안 인라인 풋노트 ^[내용] ────────
  t = t.replace(/\[\*\s*([^\]]+)\]/g, (_, note) => `^[${note.trim()}]`);

  // ── 5. 링크 처리 ──────────────────────────────────
  // [[https://...|표시]] → [표시](url)  ← 클릭 가능
  t = t.replace(/\[\[https?:\/\/([^|\]]+)\|([^\]]+)\]\]/g, '[$2](https://$1)');
  // [[https://... 표시]] → [표시](url)
  t = t.replace(/\[\[(https?:\/\/\S+)\s+([^\]]+)\]\]/g, '[$2]($1)');
  // [[https://...]] → url만
  t = t.replace(/\[\[(https?:\/\/[^\]]+)\]\]/g, '$1');
  // [https://...|표시] → [표시](url)
  t = t.replace(/\[(https?:\/\/[^|\]]+)\|([^\]]+)\]/g, '[$2]($1)');
  // [https://... 표시] → [표시](url)
  t = t.replace(/\[(https?:\/\/\S+)\s+([^\]]+)\]/g, '[$2]($1)');
  // [[문서|표시]] → 표시 (내부 링크는 텍스트만)
  t = t.replace(/\[\[[^\]|]+\|([^\]]+)\]\]/g, '$1');
  // [[문서]] → 문서명
  t = t.replace(/\[\[([^\]]+)\]\]/g, '$1');

  // ── 6. 제목 ───────────────────────────────────────
  t = t.replace(/^======\s*(.+?)\s*======\s*$/gm, '###### $1');
  t = t.replace(/^=====\s*(.+?)\s*=====\s*$/gm,  '##### $1');
  t = t.replace(/^====\s*(.+?)\s*====\s*$/gm,    '#### $1');
  t = t.replace(/^===\s*(.+?)\s*===\s*$/gm,      '### $1');
  t = t.replace(/^==\s*(.+?)\s*==\s*$/gm,        '## $1');
  t = t.replace(/^=\s*(.+?)\s*=\s*$/gm,          '# $1');

  // ── 7. 글자 서식 ──────────────────────────────────
  t = t.replace(/'''''(.+?)'''''/g, '***$1***');
  t = t.replace(/'''(.+?)'''/g,     '**$1**');
  t = t.replace(/''(.+?)''/g,       '*$1*');
  t = t.replace(/~~(.+?)~~/g,       '~~$1~~');
  t = t.replace(/__(.+?)__/g,       '$1'); // 밑줄 → 평문

  // ── 8. 수평선 ─────────────────────────────────────
  t = t.replace(/^-{4,}$/gm, '---');

  // ── 9. 표 변환 ────────────────────────────────────
  t = convertTable(t);

  // ── 10. 목록 ──────────────────────────────────────
  t = t.replace(/^ {4}\* /gm,  '    - ');
  t = t.replace(/^ {2}\* /gm,  '  - ');
  t = t.replace(/^\* /gm,      '- ');

  // ── 11. 인용 ──────────────────────────────────────
  t = t.replace(/^>/gm, '> ');

  // ── 12. HTML 태그 제거 ────────────────────────────
  t = t.replace(/<[^>]+>/g, '');

  // ── 13. 빈 줄 정리 ────────────────────────────────
  t = t.replace(/\n{3,}/g, '\n\n');
  t = '나무위키 발췌\n\n' + t.trim();

  outputEl.value = t;
  copyBtn.style.display = 'inline-block';
}

function convertTable(text) {
  const lines = text.split('\n');
  const out = [];
  let headerDone = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    if (trimmed.startsWith('||') && trimmed.endsWith('||')) {
      // 셀 파싱: 앞뒤 || 제거 후 || 로 분리
      const inner = trimmed.slice(2, -2);
      const cells = inner.split('||').map(c =>
        c.replace(/<[^>]+>/g, '').trim()
      );
      const row = '| ' + cells.join(' | ') + ' |';
      out.push(row);

      if (!headerDone) {
        out.push('| ' + cells.map(() => '---').join(' | ') + ' |');
        headerDone = true;
      }
    } else {
      headerDone = false;
      out.push(line);
    }
  }
  return out.join('\n');
}

function copyOutput() {
  navigator.clipboard.writeText(outputEl.value);
  copyBtn.textContent = '✓ 복사됨';
  copyBtn.classList.add('copied');
  setTimeout(() => {
    copyBtn.textContent = '복사';
    copyBtn.classList.remove('copied');
  }, 2000);
}

function reset() {
  inputEl.value = '';
  outputEl.value = '';
  copyBtn.style.display = 'none';
  inputCount.textContent = '0자';
}
</script>
</body>
</html>
